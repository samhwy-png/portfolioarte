<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>
    <style>
       
        /* ESTILO BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth !important; 
        }


        section {
            scroll-margin-top: 80px; 
        }


        /* Menu Superior */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px; 
            z-index: 1000;
            background: transparent !important; 
        }
        .nav-links {
            display: flex;
            gap: 30px; 
        }


        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .logo {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: static !important; 
            transform: none !important; 
        }


        
        .hero {
            height: 100vh; width: 100%; position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }


        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }


        .slide.ativo { opacity: 1; } 


        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 2;
        }


        .btn-explorar {
            position: relative; z-index: 3;
            padding: 12px 35px; border: 1px solid #fff; background: transparent;
            color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }


        /* SEÇÃO SOBRE MIM */
        .sobre-mim { display: flex; min-height: 80vh; border-bottom: 1px solid #222; }
        .sobre-bloco { width: 50%; padding: 80px; display: flex; flex-direction: column; justify-content: center; }
       .pessoal, .lado-obra {
    background-color: #000000 !important;
    border-right: 1px solid #333 !important;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
}
    .artistico, .lado-zoom {
    background-color: #1a1a1a !important;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
}
       .sobre-mim h2, .sobre-mim h3, .info-obra h4 { color: #ffffff !important; }
.sobre-mim p, .info-obra p { color: #cccccc !important; }


        /* SEÇÃO DE CATEGORIAS */
        .secao-categorias { padding: 100px 50px; text-align: center; background: #000; }
        .grid-categorias { display: flex; justify-content: center; gap: 40px; margin-top: 50px; }
        .capa-categoria { width: 450px; height: 550px; position: relative; cursor: pointer; overflow: hidden; border: 1px solid #222; }
        .capa-categoria img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.8s; }
        .capa-categoria:hover img { opacity: 1; transform: scale(1.05); }
        .capa-categoria h3 { position: absolute; bottom: 30px; left: 30px; font-size: 28px; }


        /* GALERIA DE OBRAS */
        .colecao-container { display: none; background: #000; }
        .obra-item { display: flex; height: 100vh; border-bottom: 1px solid #111; }
        .lado-obra {
    width: 50% !important;
    height: 100vh !important;
    background-color: #000000 !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    align-items: center !important;
    padding: 0 !important;
}


.quadro-obra {
    width: 70% !important;  
    height: 60% !important;  
    background: #111 !important;
    border: 1px solid #333 !important;
    margin-bottom: 20px !important;
}


/* LADO DIREITO (O ZOOM) */
.lado-zoom {
    width: 50% !important;
    height: 100vh !important;
    background-color: #1a1a1a !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important; 
    padding: 80px 0 80px 0 !important;    
}


.quadro-zoom {
    width: 80% !important;   
    height: 80% !important;  
    background: #080808 !important;
    border: 1px solid #444 !important;
    border-right: none !important; 
}
        .visivel { display: block !important; }
       
    </style>
</head>
<body>


    <header style="position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; z-index: 1000; background: transparent !important;">
   
        <div class="logo" style="font-size: 18px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">
            PORTFÓLIO
        </div>


        <nav class="nav-links">
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="colecoes.html">Coleções</a>
            
        </nav>
    </header>


    <section id="inicio" class="hero">
        <div class="slide ativo" style="background-image: url(img/1.png)"></div>
        <div class="slide" style="background-image: url(img/2.png)"></div>
        <div class="slide" style="background-image: url(img/7.png)"></div>
   
    </section>

<footer style="text-align: center; padding: 40px; background: #000; border-top: 1px solid #111;">
                <p style="font-size: 9px; color: #444; letter-spacing: 3px; text-transform: uppercase;">
                    © 2026 Sophia Orsi Guimarães — Todos os direitos reservados
                </p>
            </footer>

    <script>
        // CARROSSEL AUTOMÁTICO
        let slides = document.querySelectorAll('.slide');
        let indexAtual = 0;
        function trocarSlide() {
            slides[indexAtual].classList.remove('ativo');
            indexAtual = (indexAtual + 1) % slides.length;
            slides[indexAtual].classList.add('ativo');
        }
        setInterval(trocarSlide, 4000);


    
    </script>
</body>
</html>
